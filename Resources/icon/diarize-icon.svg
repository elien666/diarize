<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <!-- macOS icon mask: rounded rect ~22% radius -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1f2937"/>
            <stop offset="1" stop-color="#0b1220"/>
        </linearGradient>
        <linearGradient id="speakerA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#3b82f6"/>
        </linearGradient>
        <linearGradient id="speakerB" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#fb923c"/>
            <stop offset="1" stop-color="#f97316"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>

    <!-- Speaker A waveform (blue, upper) — bars descending then rising, mirrored -->
    <g fill="url(#speakerA)" transform="translate(160 360)">
        <rect x="0"   y="100" width="44" height="80"  rx="22"/>
        <rect x="64"  y="60"  width="44" height="160" rx="22"/>
        <rect x="128" y="20"  width="44" height="240" rx="22"/>
        <rect x="192" y="0"   width="44" height="280" rx="22"/>
        <rect x="256" y="40"  width="44" height="200" rx="22"/>
        <rect x="320" y="80"  width="44" height="120" rx="22"/>
        <rect x="384" y="40"  width="44" height="200" rx="22"/>
        <rect x="448" y="80"  width="44" height="120" rx="22"/>
        <rect x="512" y="120" width="44" height="40"  rx="22"/>
        <rect x="576" y="80"  width="44" height="120" rx="22"/>
        <rect x="640" y="100" width="44" height="80"  rx="22"/>
        <rect x="704" y="120" width="44" height="40"  rx="22"/>
    </g>

    <!-- Speaker B waveform (orange, lower) — different rhythm so they don't align -->
    <g fill="url(#speakerB)" transform="translate(160 540)">
        <rect x="0"   y="120" width="44" height="40"  rx="22"/>
        <rect x="64"  y="100" width="44" height="80"  rx="22"/>
        <rect x="128" y="60"  width="44" height="160" rx="22"/>
        <rect x="192" y="20"  width="44" height="240" rx="22"/>
        <rect x="256" y="0"   width="44" height="280" rx="22"/>
        <rect x="320" y="40"  width="44" height="200" rx="22"/>
        <rect x="384" y="80"  width="44" height="120" rx="22"/>
        <rect x="448" y="20"  width="44" height="240" rx="22"/>
        <rect x="512" y="60"  width="44" height="160" rx="22"/>
        <rect x="576" y="100" width="44" height="80"  rx="22"/>
        <rect x="640" y="80"  width="44" height="120" rx="22"/>
        <rect x="704" y="100" width="44" height="80"  rx="22"/>
    </g>

    <!-- Subtle horizontal divider between the two speakers (dotted, dim) -->
    <line x1="180" y1="540" x2="844" y2="540"
          stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 18" opacity="0.6"/>
</svg>
